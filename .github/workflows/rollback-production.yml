name: Roll Back Production

on:
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: Optional SHA to roll back to. Leave empty to use the recorded previous release.
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Write SSH material
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Roll back on production server
        env:
          ROLLBACK_SHA: ${{ inputs.rollback_sha }}
        run: |
          ssh -p 55463 ubuntu@e1.chiasegpu.vn \
            "export APP_DIR='/home/ubuntu/social-listening-v3' ROLLBACK_SHA='${ROLLBACK_SHA}'; bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"
          git fetch origin --prune
          chmod +x scripts/*.sh
          scripts/rollback_production.sh
          REMOTE
